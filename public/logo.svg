<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Bhat Overseas — Building Bridges, Empowering Nations">
  <title>Bhat Overseas</title>
  <!-- Brand color used everywhere -->
  <defs>
    <style>
      .navy { fill: #1A2A6C; }
      .stroke-navy { stroke: #1A2A6C; fill: none; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      .name {
        fill: #1A2A6C;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-weight: 800;
        font-size: 76px;
        letter-spacing: -1px;
      }
      .tagline {
        fill: #1A2A6C;
        font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        font-weight: 500;
        font-size: 18px;
        letter-spacing: 0.8px;
      }
    </style>
  </defs>

  <!-- Globe + airplane mark on the left -->
  <g transform="translate(20, 36)">
    <!-- Globe outer circle -->
    <circle cx="55" cy="80" r="48" class="stroke-navy" stroke-width="5" />
    <!-- Equator -->
    <ellipse cx="55" cy="80" rx="48" ry="14" class="stroke-navy" stroke-width="3" />
    <!-- Meridian -->
    <ellipse cx="55" cy="80" rx="14" ry="48" class="stroke-navy" stroke-width="3" />
    <!-- Stylized continent shapes -->
    <path d="M 30 60 Q 38 55 46 62 Q 50 70 44 76 Q 36 80 30 76 Z" class="navy" />
    <path d="M 60 92 Q 70 90 76 96 Q 78 104 72 108 Q 64 110 60 104 Z" class="navy" />

    <!-- Airplane flying up-right above globe -->
    <g transform="translate(48, 0) rotate(28)">
      <!-- Body -->
      <path d="M 0 18 L 88 12 L 96 16 L 88 20 L 0 22 Z" class="navy" />
      <!-- Wings -->
      <path d="M 36 12 L 50 -2 L 56 -2 L 54 14 Z" class="navy" />
      <path d="M 36 26 L 50 38 L 56 38 L 54 24 Z" class="navy" />
      <!-- Tail -->
      <path d="M 0 14 L 12 4 L 16 4 L 10 16 Z" class="navy" />
      <path d="M 0 22 L 12 32 L 16 32 L 10 22 Z" class="navy" />
    </g>
  </g>

  <!-- Company name -->
  <text x="160" y="105" class="name">Bhat Overseas</text>

  <!-- Tagline -->
  <text x="162" y="140" class="tagline">Building Bridges  ·  Empowering Nations</text>
</svg>
